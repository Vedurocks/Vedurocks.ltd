services:
  - type: web
    name: vedurocks-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: GITHUB_CLIENT_ID
        sync: false  # Set manually in dashboard
      - key: GITHUB_CLIENT_SECRET
        sync: false  # Set manually in dashboard
      - key: FRONTEND_URL
        value: https://vedurocks.vercel.app  # Update with your frontend URL
